name: Daily AI Crawl

on:
  schedule:
    - cron: '0 22 * * *'  # Daily at UTC 22:00 (KST 07:00)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run crawler
        run: uv run python -m src.main
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "crawl: $(date -u +%Y-%m-%d)"
          git push
